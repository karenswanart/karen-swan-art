<form
  action="https://formsubmit.co/ksa@karenswanart.com"
  method="POST"
  enctype="multipart/form-data"
  class="testimonial-form"
>
  <input type="hidden" name="_subject" value="New Testimonial Submission - Karen Swan Art">
  <input type="hidden" name="_captcha" value="false">
  <input type="hidden" name="_template" value="table">
  <input type="hidden" name="_next" value="https://www.karenswanart.com/thank-you.html">

  <div class="form-row">
    <label for="t_title">Testimonial Title</label>
    <input
      id="t_title"
      name="title"
      type="text"
      required
      maxlength="80"
    />
    <div class="field-note">Max 80 characters.</div>
  </div>

  <div class="form-row">
    <label for="t_name">Name</label>
    <input
      id="t_name"
      name="name"
      type="text"
      required
      maxlength="80"
      placeholder="How you’d like your name to appear"
    />
  </div>

  <div class="form-row">
    <label for="t_email">Email (so we can follow up if needed)</label>
    <input
      id="t_email"
      name="email"
      type="email"
      required
      maxlength="150"
    />
  </div>

  <div class="form-row">
    <label for="t_quote">Your Note</label>
    <textarea
      id="t_quote"
      name="quote"
      required
      maxlength="1200"
      placeholder="Write your testimonial here…"
    ></textarea>
    <div class="field-note">Max 1200 characters.</div>
  </div>

  <div class="form-row">
    <label for="t_photo">Upload a Photo</label>
    <input
      id="t_photo"
      name="attachment"
      type="file"
      accept="image/*"
      class="file-input"
    />
    <div class="field-note">JPG/PNG recommended.</div>
  </div>

  <button type="submit" class="primary-button submit-button">
    Submit Testimonial
  </button>
</form>
