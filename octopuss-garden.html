<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Octopus's Garden | Karen Swan Art</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .project-page {
      max-width: 1320px;
      margin: 0 auto;
      padding: 0 20px 90px;
    }

    .project-hero-wrap {
      position: relative;
    }

    .collection-stamp {
      position: absolute;
      top: 26px;
      left: 0;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border: 1px solid rgba(140, 48, 76, 0.22);
      border-radius: 999px;
      background: rgba(255, 248, 242, 0.82);
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 26px rgba(69, 29, 39, 0.08);
      color: var(--accent-deep);
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      line-height: 1.2;
      z-index: 2;
    }

    .collection-stamp::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--accent-soft));
      box-shadow: 0 0 0 4px rgba(201, 154, 79, 0.12);
      flex: 0 0 auto;
    }

    .single-centered-row {
      max-width: 760px;
      margin: 0 auto 28px;
    }

    .single-centered-row .art-card {
      background: transparent;
      border: none;
      box-shadow: none;
    }

    .single-centered-row .art-card img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
      background: transparent;
    }

    .project-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 28px;
    }

    @media (max-width: 1100px) {
      .project-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 900px) {
      .collection-stamp {
        position: static;
        margin: 26px 0 0;
        justify-content: center;
      }

      .project-hero-wrap .page-hero {
        padding-top: 34px;
      }
    }

    @media (max-width: 760px) {
      .project-grid {
        grid-template-columns: 1fr;
      }

      .single-centered-row {
        max-width: 100%;
      }

      .collection-stamp {
        font-size: 0.72rem;
        letter-spacing: 0.1em;
        padding: 9px 14px;
      }
    }
  </style>
</head>
<body>
  <div id="site-nav"></div>

  <main class="project-page">
    <div class="project-hero-wrap">
      <div class="collection-stamp">Made for the collection of PJ &amp; Beau</div>

      <section class="page-hero">
        <h1>Octopus's Garden</h1>
        <p class="page-intro">
          This whimsical piece is a deep dive directly into the imagination of Ringo Starr.
        </p>
      </section>
    </div>

    <section class="single-centered-row">
      <article class="art-card">
        <img src="KSA/img63.jpg" alt="Octopus's Garden featured image" class="project-image" />
      </article>
    </section>

    <section class="project-grid">
      <article class="art-card">
        <img src="KSA/img635.jpeg" alt="The Original Sketch" class="project-image" />
      </p>
        <div class="art-caption">
          <h3>The Original Sketch</h3>
<p>🎵 I’d like to be... under the sea... in an octopus’s garden with you 🎵</p>                    
                  </p>
        </div>
      </article>

      <article class="art-card">
        <img src="KSA/img633.jpeg" alt="PJ &amp; Beau Loving It" class="project-image" />
        <div class="art-caption">
          <h3>PJ &amp; Beau Loving It</h3>
        </div>
      </article>

      <article class="art-card">
        <img src="KSA/img634.png" alt="Beau Wishing He Were an Octopus" class="project-image" />
        <div class="art-caption">
          <h3>Beau Wishing He Were an Octopus</h3>
        </div>
      </article>
    </section>
  </main>

  <div class="lightbox" id="lightbox" hidden>
    <button class="lightbox-close" id="lightboxClose" aria-label="Close image">&times;</button>
    <img id="lightboxImg" src="" alt="">
  </div>

  <script>
    const clickableImages = document.querySelectorAll(".project-image");
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightboxImg");
    const lightboxClose = document.getElementById("lightboxClose");

    function openLightbox(img) {
      lightboxImg.src = img.currentSrc || img.src;
      lightboxImg.alt = img.alt || "";
      lightbox.hidden = false;
      lightbox.classList.add("open");
      document.body.style.overflow = "hidden";
    }

    function closeLightbox() {
      lightbox.classList.remove("open");
      lightbox.hidden = true;
      lightboxImg.src = "";
      lightboxImg.alt = "";
      document.body.style.overflow = "";
    }

    clickableImages.forEach((img) => {
      img.addEventListener("click", () => openLightbox(img));
    });

    lightboxClose.addEventListener("click", closeLightbox);

    lightbox.addEventListener("click", (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && !lightbox.hidden) closeLightbox();
    });
  </script>

  <script src="nav.js"></script>
</body>
</html>
