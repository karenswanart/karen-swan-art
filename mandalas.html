<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mandalas | Karen Swan Art</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .single-centered-row {
      max-width: 760px;
      margin: 0 auto 28px;
    }

    .single-centered-row .art-card {
      background: transparent;
      border: none;
      box-shadow: none;
    }

    .single-centered-row .art-card img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
      background: transparent;
    }

    .owned-image-wrap {
      position: relative;
      overflow: hidden;
      border-radius: 24px;
    }

    .mini-collection-stamp {
      position: absolute;
      top: 26px;
      left: -28px;
      width: 190px;
      transform: rotate(-45deg);
      transform-origin: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px 18px;
      border: 1px solid rgba(140, 48, 76, 0.22);
      background: rgba(255, 248, 242, 0.92);
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 26px rgba(69, 29, 39, 0.08);
      color: var(--accent-deep);
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      line-height: 1.1;
      z-index: 3;
      pointer-events: none;
      white-space: nowrap;
      text-align: center;
    }

    .mini-collection-stamp::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--accent-soft));
      box-shadow: 0 0 0 3px rgba(201, 154, 79, 0.12);
      flex: 0 0 auto;
    }

    @media (max-width: 760px) {
      .single-centered-row {
        max-width: 100%;
      }

      .mini-collection-stamp {
        top: 20px;
        left: -34px;
        width: 175px;
        font-size: 0.56rem;
        padding: 7px 14px;
      }
    }
  </style>
</head>
<body>
  <div id="site-nav"></div>

  <main class="page-shell standalone-page">
    <header class="page-hero">
      <h1>A Collection of Mandalas</h1>
      <p class="page-intro">
        A collection of mandala-inspired fabric artworks by Karen Swan. Each piece explores
        symmetry, texture, and color through carefully layered appliqué and stitched detail.
      </p>
    </header>

    <section class="single-centered-row">
      <article class="art-card">
        <img src="KSA/img30.jpg" alt="Mandalas featured image" class="project-image" />
      </article>
    </section>

    <section class="project-section">
      <div class="art-grid">
        <article class="art-card">
          <img src="KSA/img9.jpg" alt="Mandala artwork 1" class="project-image" />
        </article>

        <article class="art-card">
          <div class="owned-image-wrap">
            <img src="KSA/img31.jpg" alt="Mandala artwork 2" class="project-image" />
            <div class="mini-collection-stamp">Ben's Collection</div>
          </div>
        </article>

        <article class="art-card">
          <img src="KSA/img26.jpg" alt="Mandala artwork 3" class="project-image" />
        </article>

        <article class="art-card">
          <img src="KSA/img61.jpg" alt="Mandala artwork 4" class="project-image" />
        </article>

        <article class="art-card">
          <img src="KSA/img11.jpg" alt="Mandala artwork 5" class="project-image" />
        </article>

        <article class="art-card">
          <img src="KSA/img39.jpg" alt="Mandala artwork 6" class="project-image" />
        </article>

        <article class="art-card">
          <img src="KSA/img1.jpg" alt="Mandala artwork 7" class="project-image" />
        </article>

        <article class="art-card">
          <img src="KSA/img13.jpg" alt="Mandala artwork 8" class="project-image" />
        </article>

        <article class="art-card">
          <img src="KSA/img2.jpg" alt="Mandala artwork 9" class="project-image" />
        </article>

        <article class="art-card">
          <img src="KSA/img800.jpeg" alt="Mandala artwork 10" class="project-image" />
        </article>

        <article class="art-card">
          <img src="KSA/img801.jpeg" alt="Mandala artwork 11" class="project-image" />
        </article>

        <article class="art-card">
          <img src="KSA/img802.jpeg" alt="Mandala artwork 12" class="project-image" />
        </article>

        <article class="art-card">
          <img src="KSA/img803.jpeg" alt="Mandala artwork 13" class="project-image" />
        </article>

        <article class="art-card">
          <img src="KSA/img804.jpeg" alt="Mandala artwork 14" class="project-image" />
        </article>
      </div>
    </section>
  </main>

  <div class="lightbox" id="lightbox" hidden>
    <button class="lightbox-close" id="lightbox-close" aria-label="Close image view">&times;</button>
    <img id="lightbox-image" src="" alt="" />
  </div>

  <script src="nav.js"></script>
  <script>
    const lightbox = document.getElementById('lightbox');
    const lightboxImage = document.getElementById('lightbox-image');
    const lightboxClose = document.getElementById('lightbox-close');
    const clickableImages = document.querySelectorAll('.project-image');

    clickableImages.forEach((img) => {
      img.addEventListener('click', () => {
        lightboxImage.src = img.src;
        lightboxImage.alt = img.alt;
        lightbox.hidden = false;
        lightbox.classList.add('open');
        document.body.style.overflow = 'hidden';
      });
    });

    function closeLightbox() {
      lightbox.classList.remove('open');
      lightbox.hidden = true;
      lightboxImage.src = '';
      lightboxImage.alt = '';
      document.body.style.overflow = '';
    }

    lightboxClose.addEventListener('click', closeLightbox);

    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) {
        closeLightbox();
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !lightbox.hidden) {
        closeLightbox();
      }
    });
  </script>
</body>
</html>
