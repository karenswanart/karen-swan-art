<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mary's Peace | Karen Swan Art</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .single-centered-row {
      max-width: 760px;
      margin: 0 auto 28px;
    }

    .single-centered-row .art-card {
      background: transparent;
      border: none;
      box-shadow: none;
    }

    .single-centered-row .art-card img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
      background: transparent;
    }

    .two-up-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 28px;
      max-width: 1100px;
      margin: 0 auto;
    }

    @media (max-width: 760px) {
      .single-centered-row {
        max-width: 100%;
      }

      .two-up-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="site-nav"></div>

  <main class="page-shell standalone-page">
    <header class="page-hero">
      <h1>Mary's Peace</h1>
      <p class="page-intro">
        Mary's Peace was commissioned by Mary Thorn, mother of Mary K. On Mary K's daughter's birthday, she became homesick. She went into a cathedral, lit a candle for her under a statue of the Virgin Mary, and felt peace had overcome her.
      </p>
    </header>

    <section class="single-centered-row">
      <article class="art-card">
        <img src="KSA/img820.jpeg" alt="Mary's Peace featured image" class="project-image" />
      </article>
    </section>

    <section class="project-section">
      <div class="two-up-grid">
        <article class="art-card">
          <img src="KSA/img821.jpeg" alt="Orb Prayer" class="project-image" />
          <div class="art-caption">
            <h3>Orb Prayer</h3>
            <p>blah blah blah</p>
          </div>
        </article>

        <article class="art-card">
          <img src="KSA/img822.jpeg" alt="Seasons" class="project-image" />
          <div class="art-caption">
            <h3>Seasons</h3>
            <p>blah blah blah</p>
          </div>
        </article>
      </div>
    </section>
  </main>

  <div class="lightbox" id="lightbox" hidden>
    <button class="lightbox-close" id="lightbox-close" aria-label="Close image view">&times;</button>
    <img id="lightbox-image" src="" alt="" />
  </div>

  <script src="nav.js"></script>
  <script>
    const lightbox = document.getElementById('lightbox');
    const lightboxImage = document.getElementById('lightbox-image');
    const lightboxClose = document.getElementById('lightbox-close');
    const clickableImages = document.querySelectorAll('.project-image');

    clickableImages.forEach((img) => {
      img.addEventListener('click', () => {
        lightboxImage.src = img.src;
        lightboxImage.alt = img.alt;
        lightbox.hidden = false;
        lightbox.classList.add('open');
        document.body.style.overflow = 'hidden';
      });
    });

    function closeLightbox() {
      lightbox.classList.remove('open');
      lightbox.hidden = true;
      lightboxImage.src = '';
      lightboxImage.alt = '';
      document.body.style.overflow = '';
    }

    lightboxClose.addEventListener('click', closeLightbox);

    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) {
        closeLightbox();
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !lightbox.hidden) {
        closeLightbox();
      }
    });
  </script>
</body>
</html>
