<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | Karen Swan Art</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    .thank-you-page {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 70px;
      position: relative;
      z-index: 1;
    }

    .thank-you-title {
      margin: 0;
      font-size: clamp(3rem, 9vw, 6.5rem);
      line-height: 1;
      text-align: center;
      letter-spacing: -0.04em;
    }

    #confetti-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>
<body>
  <canvas id="confetti-canvas"></canvas>

  <main class="thank-you-page">
    <h1 class="thank-you-title">Thank You</h1>
  </main>

  <script>
    const canvas = document.getElementById("confetti-canvas");
    const ctx = canvas.getContext("2d");

    let pieces = [];
    const colors = [
      "#8c304c",
      "#c99a4f",
      "#f3d9b1",
      "#f7ede2",
      "#d99058",
      "#b56576"
    ];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function createPiece() {
      return {
        x: random(0, canvas.width),
        y: random(-canvas.height, 0),
        w: random(6, 14),
        h: random(10, 20),
        color: colors[Math.floor(Math.random() * colors.length)],
        speed: random(2, 5),
        drift: random(-1.5, 1.5),
        rotation: random(0, Math.PI * 2),
        rotationSpeed: random(-0.08, 0.08)
      };
    }

    function populateConfetti(count) {
      pieces = [];
      for (let i = 0; i < count; i++) {
        pieces.push(createPiece());
      }
    }

    function drawPiece(piece) {
      ctx.save();
      ctx.translate(piece.x, piece.y);
      ctx.rotate(piece.rotation);
      ctx.fillStyle = piece.color;
      ctx.fillRect(-piece.w / 2, -piece.h / 2, piece.w, piece.h);
      ctx.restore();
    }

    function updatePieces() {
      for (const piece of pieces) {
        piece.y += piece.speed;
        piece.x += piece.drift;
        piece.rotation += piece.rotationSpeed;

        if (piece.y - piece.h > canvas.height) {
          piece.x = random(0, canvas.width);
          piece.y = random(-120, -20);
        }

        if (piece.x < -30) piece.x = canvas.width + 30;
        if (piece.x > canvas.width + 30) piece.x = -30;
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      updatePieces();

      for (const piece of pieces) {
        drawPiece(piece);
      }

      requestAnimationFrame(animate);
    }

    window.addEventListener("resize", () => {
      resizeCanvas();
      populateConfetti(180);
    });

    resizeCanvas();
    populateConfetti(180);
    animate();

    setTimeout(() => {
      window.location.href = "https://www.karenswanart.com/";
    }, 8000);
  </script>
</body>
</html>
