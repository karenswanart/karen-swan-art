    const container = document.getElementById("projects-container");

    projects.forEach(project => {
      const section = document.createElement("section");
      section.className = "project-section";

      const header = document.createElement("div");
      header.className = "project-header";

      const title = document.createElement("h2");
      title.textContent = project.title;

      const desc = document.createElement("p");
      desc.textContent = project.description;

      header.appendChild(title);
      header.appendChild(desc);

      const grid = document.createElement("div");
      grid.className = "art-grid";

      project.images.forEach(num => {
        const card = document.createElement("article");
        card.className = "art-card";

        const img = document.createElement("img");
        img.src = `KSA/img${num}.jpg`;
        img.alt = `${project.title} image ${num}`;
        img.loading = "lazy";

        const caption = document.createElement("div");
        caption.className = "art-caption";

        const imageTitle = document.createElement("h3");
        imageTitle.textContent = `Image ${num}`;

        const imageDesc = document.createElement("p");
        imageDesc.textContent = imageDescriptions[num] || "Add a short description here.";

        caption.appendChild(imageTitle);
        caption.appendChild(imageDesc);

        card.appendChild(img);
        card.appendChild(caption);
        grid.appendChild(card);
      });

      section.appendChild(header);
      section.appendChild(grid);
      container.appendChild(section);
    });
  </script>
        <div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose" aria-label="Close image">&times;</button>
  <img id="lightboxImg" src="" alt="">
</div>

<script>
  const clickableImages = document.querySelectorAll(
    ".art-card img, .about-images img, .more-photos-grid img, .inquiry-image"
  );

  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightboxImg");
  const lightboxClose = document.getElementById("lightboxClose");

  clickableImages.forEach((img) => {
    img.addEventListener("click", () => {
      lightboxImg.src = img.src;
      lightboxImg.alt = img.alt || "";
      lightbox.classList.add("open");
    });
  });

  function closeLightbox() {
    lightbox.classList.remove("open");
    lightboxImg.src = "";
  }

  lightboxClose.addEventListener("click", closeLightbox);

  lightbox.addEventListener("click", (e) => {
    if (e.target === lightbox) {
      closeLightbox();
    }
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
      closeLightbox();
    }
  });
</script>
