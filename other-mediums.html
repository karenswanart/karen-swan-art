<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Other Mediums | Karen Swan Art</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .project-page {
      max-width: 1320px;
      margin: 0 auto;
      padding: 0 20px 90px;
    }

    .project-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 28px;
      align-items: stretch;
    }

    .project-grid .art-card {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 420px;
      padding: 0;
      background: transparent;
      border: none;
      box-shadow: none;
      overflow: visible;
    }

    .project-grid .art-card:hover {
      transform: none;
      box-shadow: none;
    }

    .project-grid .art-card img {
      display: block;
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      background: transparent;
      border-radius: 24px;
    }

    @media (max-width: 1100px) {
      .project-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .project-grid .art-card {
        height: 380px;
      }
    }

    @media (max-width: 760px) {
      .project-grid {
        grid-template-columns: 1fr;
      }

      .project-grid .art-card {
        height: auto;
      }

      .project-grid .art-card img {
        width: 100%;
        height: auto;
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <div id="site-nav"></div>

  <main class="project-page">
    <section class="page-hero">
      <h1>Other Mediums</h1>
      <p class="page-intro">
        A small collection of Karen’s work in other artistic mediums.
      </p>
    </section>

    <section class="project-grid">
      <article class="art-card">
        <img src="KSA/img46.jpg" alt="Other Mediums piece 46" class="project-image" />
      </article>

      <article class="art-card">
        <img src="KSA/img48.jpg" alt="Other Mediums piece 48" class="project-image" />
      </article>

      <article class="art-card">
        <img src="KSA/img58.jpg" alt="Other Mediums piece 58" class="project-image" />
      </article>

      <article class="art-card">
        <img src="KSA/img66.jpg" alt="Other Mediums piece 66" class="project-image" />
      </article>

      <article class="art-card">
        <img src="KSA/img708.jpeg" alt="Other Mediums piece 708" class="project-image" />
      </article>

      <article class="art-card">
        <img src="KSA/img709.jpeg" alt="Other Mediums piece 709" class="project-image" />
      </article>

            <article class="art-card">
        <img src="KSA/img735.png" alt="Other Mediums piece 735" class="project-image" />
      </article>

                  <article class="art-card">
        <img src="KSA/img744.jpeg" alt="Other Mediums piece 744" class="project-image" />
      </article>

                  <article class="art-card">
        <img src="KSA/img745.jpeg" alt="Other Mediums piece 745" class="project-image" />
      </article>

                  <article class="art-card">
        <img src="KSA/img746.jpeg" alt="Other Mediums piece 746" class="project-image" />
      </article>

                  <article class="art-card">
        <img src="KSA/img747.jpeg" alt="Other Mediums piece 747" class="project-image" />
      </article>

      <article class="art-card">
        <img src="KSA/img710.jpeg" alt="Other Mediums piece 710" class="project-image" />
      </article>
    </section>
  </main>

  <div class="lightbox" id="lightbox" hidden>
    <button class="lightbox-close" id="lightboxClose" aria-label="Close image">&times;</button>
    <img id="lightboxImg" src="" alt="">
  </div>

  <script>
    const clickableImages = document.querySelectorAll(".project-image");
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightboxImg");
    const lightboxClose = document.getElementById("lightboxClose");

    function openLightbox(img) {
      lightboxImg.src = img.currentSrc || img.src;
      lightboxImg.alt = img.alt || "";
      lightbox.hidden = false;
      lightbox.classList.add("open");
      document.body.style.overflow = "hidden";
    }

    function closeLightbox() {
      lightbox.classList.remove("open");
      lightbox.hidden = true;
      lightboxImg.src = "";
      lightboxImg.alt = "";
      document.body.style.overflow = "";
    }

    clickableImages.forEach((img) => {
      img.addEventListener("click", () => openLightbox(img));
    });

    lightboxClose.addEventListener("click", closeLightbox);

    lightbox.addEventListener("click", (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && !lightbox.hidden) closeLightbox();
    });
  </script>

  <script src="nav.js"></script>
</body>
</html>
